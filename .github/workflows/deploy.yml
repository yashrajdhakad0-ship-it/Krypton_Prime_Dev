name: Deploy Expense Tracker to Pages

on:
  push:
    branches: ["main"] # Triggers deployment when you push to main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps:deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This tells GitHub to only host the Expense_Tracker folder
          path: 'Expense_Tracker'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
